services:
  db:
    image: postgres:17
    restart: always
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass
      POSTGRES_DB: tododb
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    profiles: ["prod"]
    build: .
    restart: always
    ports:
      - "8080:3000"
    environment:
      DATABASE_URL: postgres://todouser:todopass@db:5432/tododb
      NODE_ENV: production
    depends_on:
      - db

volumes:
  pgdata:
